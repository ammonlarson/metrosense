name: MetroSense
options:
  bundleIdPrefix: com.metrosense
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

targets:
  MetroSense:
    type: application
    platform: iOS
    sources:
      - MetroSense
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.metrosense.app
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: MetroSense/Resources/Info.plist
        DEVELOPMENT_TEAM: E5787F652X
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: MetroSense/Resources/Info.plist
      properties:
        UILaunchStoryboardName: LaunchScreen
        NSLocationWhenInUseUsageDescription: "MetroSense uses your location to detect when you are on the Copenhagen Metro."
        NSLocationAlwaysAndWhenInUseUsageDescription: "MetroSense uses your location in the background to detect metro travel."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          - location
